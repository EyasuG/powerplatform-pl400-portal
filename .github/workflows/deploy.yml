name: Deploy to GitHub Pages

on:
  push:
    branches: [main, jobReady]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Lint & validate ────────────────────────────────────────────────────────
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Lint HTML
        run: html-validate index.html --config '{"extends":["html-validate:recommended"],"rules":{"no-inline-style":"off","long-title":"off"}}'

  # ── Deploy to GitHub Pages ─────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
